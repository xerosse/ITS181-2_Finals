spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/springbootdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Change this from 'update' to 'create-drop' temporarily to recreate tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Enable SQL initialization - will only insert if data doesn't exist
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=18080
